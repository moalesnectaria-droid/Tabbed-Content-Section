<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabbed Content Section</title>

    <!--  CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>My Information</h1>

        <!-- Buttons for tabs -->
        <div class="tabs">

            <button class="tab-btn active" data-tab="overview">
                Overview
            </button>

            <button class="tab-btn" data-tab="skills">
                Skills
            </button>

            <button class="tab-btn" data-tab="contact">
                Contact
            </button>

        </div>

        <!-- Content for each tab -->

        <div id="overview" class="tab-content active">
            <h2>Overview</h2>

            <p>
                Hello! I am Maria-Nectaria, a Computer Science student
                passionate about Frontend Development and AI.
            </p>
        </div>

        <div id="skills" class="tab-content">

            <h2>Skills</h2>

            <p>
                HTML, CSS, JavaScript, React, Java, SQL and GitHub.
            </p>

        </div>

        <div id="contact" class="tab-content">

            <h2>Contact</h2>

            <p>Email: moalesnectaria@gmail.com</p>
            <p>Location: London, United Kingdom</p>

        </div>

    </div>

    <!-- link to JavaScript -->
    <script src="script.js"></script>

</body>
</html>
